name: Publish Docker

on:
  push:
    branches:
      - 'main'
      - 'master'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          APP_VERSION="$(sed -nE "s/^define\\('VERSION', '([^']+)'\\);/\\1/p" simplefilemanager.php | head -n 1)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$APP_VERSION" ]; then
            echo "Could not determine VERSION from simplefilemanager.php"
            exit 1
          fi
          if [ "$APP_VERSION" != "$TAG_VERSION" ]; then
            echo "VERSION mismatch: simplefilemanager.php has '$APP_VERSION' but the git tag is '$TAG_VERSION'"
            exit 1
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          flavor: |
            latest=false
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/singlefilemanager
            ghcr.io/${{ github.repository_owner }}/singlefilemanager
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
