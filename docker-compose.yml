services:
  singlefilemanager:
    build: .                                            # Uncomment if you want to build locally instead of pulling
#    image: ghcr.io/alceasan/singlefilemanager:latest   ###  If you want to run a Docker container from a registry, comment out 'build: .'
    container_name: singlefilemanager
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./data:/var/www/html/data                       ### Replace "./data" with your persistent storage path if needed.
      - ./config.php:/var/www/html/config.php           ### Recommended: copy config.sample.php to config.php and keep it outside the image.

    environment:
      TZ: UTC

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
